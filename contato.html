<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contato | Rafael Amorim</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  
<header>
  <nav>
    <ul>
      <li><a href="index.html">Sobre</a></li>
      <li><a href="formacao.html">Formação</a></li>
      <li><a href="portfolio.html">Portfólio</a></li>
      <li><a href="contato.html">Contato</a></li>
    </ul>
  </nav>
  <button id="btnTema" aria-label="Alternar tema claro/escuro">🌙 Tema</button>
</header>

<main>
  <p id="saudacao" class="saudacao"></p>
  
  <section>
    <h1>Vamos conversar?</h1>
    <p>Se você tem um projeto, oportunidade ou apenas quer trocar ideias sobre tecnologia, fique à vontade para enviar uma mensagem.</p>
    
    <form id="formContato">
      <label for="nome">Nome completo</label>
      <input type="text" id="nome" name="nome" required placeholder="Seu nome">

      <label for="email">E-mail profissional</label>
      <input type="email" id="email" name="email" required placeholder="seu@email.com">

      <label for="mensagem">Mensagem</label>
      <textarea id="mensagem" name="mensagem" rows="5" required placeholder="Descreva sua ideia ou dúvida..."></textarea>

      <button type="submit" class="btn-enviar">Enviar mensagem</button>
    </form>
  </section>
</main>

<footer>
  <p>&copy; 2025 - Rafael Araújo Amorim</p>
</footer>

<script src="js/script.js"></script>
</body>
</html>
